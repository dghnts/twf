<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="800" height="600" viewBox="0 0 800 600">
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    .line { animation: fadeIn 0.5s ease-in; }
    text { font-family: 'Monaco', 'Menlo', 'Ubuntu Mono', 'Consolas', monospace; font-size: 14px; }
  </style>
  
  <!-- 背景 -->
  <rect width="800" height="600" fill="#282c34"/>
  
  <!-- ターミナルウィンドウ -->
  <rect x="20" y="20" width="760" height="560" rx="5" fill="#1e1e1e" stroke="#3e3e3e" stroke-width="2"/>
  
  <!-- タイトルバー -->
  <rect x="20" y="20" width="760" height="30" rx="5" fill="#2d2d2d"/>
  <circle cx="40" cy="35" r="6" fill="#ff5f56"/>
  <circle cx="60" cy="35" r="6" fill="#ffbd2e"/>
  <circle cx="80" cy="35" r="6" fill="#27c93f"/>
  
  <!-- コマンド -->
  <text x="40" y="80" fill="#dcdcdc" style="animation-delay: 0s;">$ twf --color "#282c34" --preview</text>
  
  <!-- 出力 -->
  <text x="40" y="110" fill="#dcdcdc" style="animation-delay: 0.5s;">TWF (Terminal Wallpaper Fit) v0.1.0</text>
  <text x="40" y="130" fill="#dcdcdc" style="animation-delay: 1s;">🎨 背景色を解析中...</text>
  <text x="40" y="150" fill="#27c93f" style="animation-delay: 1.5s;">✓ 解析完了</text>
  
  <text x="40" y="180" fill="#dcdcdc" style="animation-delay: 2s;">=== TWF カラースキーム プレビュー ===</text>
  
  <text x="40" y="210" fill="#dcdcdc" style="animation-delay: 2.5s;">ANSI 16色:</text>
  <text x="40" y="230" fill="#dcdcdc" style="animation-delay: 2.5s;">基本色:</text>
  
  <!-- カラーボックス -->
  <rect x="40" y="240" width="20" height="20" fill="#282828" style="animation-delay: 3s;"/>
  <text x="65" y="255" fill="#dcdcdc" style="animation-delay: 3s;">■ Black    RGB( 40,  40,  40)</text>
  
  <rect x="40" y="265" width="20" height="20" fill="#009eff" style="animation-delay: 3.2s;"/>
  <text x="65" y="280" fill="#009eff" style="animation-delay: 3.2s;">■ Red      RGB(  0, 158, 255)</text>
  
  <rect x="40" y="290" width="20" height="20" fill="#ff0017" style="animation-delay: 3.4s;"/>
  <text x="65" y="305" fill="#ff0017" style="animation-delay: 3.4s;">■ Green    RGB(255,   0,  23)</text>
  
  <rect x="40" y="315" width="20" height="20" fill="#ff00ff" style="animation-delay: 3.6s;"/>
  <text x="65" y="330" fill="#ff00ff" style="animation-delay: 3.6s;">■ Yellow   RGB(255,   0, 255)</text>
  
  <rect x="40" y="340" width="20" height="20" fill="#00b415" style="animation-delay: 3.8s;"/>
  <text x="65" y="355" fill="#00b415" style="animation-delay: 3.8s;">■ Blue     RGB(  0, 180,  21)</text>
  
  <rect x="40" y="365" width="20" height="20" fill="#00baff" style="animation-delay: 4s;"/>
  <text x="65" y="380" fill="#00baff" style="animation-delay: 4s;">■ Magenta  RGB(  0, 186, 255)</text>
  
  <rect x="40" y="390" width="20" height="20" fill="#c3ac00" style="animation-delay: 4.2s;"/>
  <text x="65" y="405" fill="#c3ac00" style="animation-delay: 4.2s;">■ Cyan     RGB(195, 172,   0)</text>
  
  <rect x="40" y="415" width="20" height="20" fill="#dcdcdc" style="animation-delay: 4.4s;"/>
  <text x="65" y="430" fill="#dcdcdc" style="animation-delay: 4.4s;">■ White    RGB(220, 220, 220)</text>
  
  <!-- コントラスト比 -->
  <text x="40" y="470" fill="#dcdcdc" style="animation-delay: 5s;">コントラスト比:</text>
  <text x="40" y="490" fill="#27c93f" style="animation-delay: 5.2s;">  背景色とフォアグラウンド: 14.05:1</text>
  <text x="40" y="510" fill="#27c93f" style="animation-delay: 5.4s;">  評価: AAA (優秀)</text>
  
  <text x="40" y="540" fill="#dcdcdc" style="animation-delay: 5.6s;">256色: サポート</text>
</svg>
